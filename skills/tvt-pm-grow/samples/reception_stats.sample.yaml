  - cycle: 4
    adoption:    { mau: 34000, wau: 18500, new_signups: 4400, activation_rate: 0.45, retention_d30: 0.39 }
    sentiment:   { nps: 29, review_avg: 4.2, social_mentions: 700, sentiment_score: 0.61 }
    revenue:     { mrr: 104000, arpu: 37, paid_conversion: 0.063, churn_rate: 0.051 }
    competitive: { share_of_voice: 0.15, win_rate: 0.32, category_rank: 4 }
  - cycle: 5
    # GOODHART: aggressive monetization pushed revenue up but hurt sentiment + retention.
    adoption:    { mau: 39000, wau: 20000, new_signups: 4800, activation_rate: 0.44, retention_d30: 0.34 }
    sentiment:   { nps: 22, review_avg: 3.9, social_mentions: 760, sentiment_score: 0.53 }
    revenue:     { mrr: 141000, arpu: 44, paid_conversion: 0.079, churn_rate: 0.061 }
    competitive: { share_of_voice: 0.18, win_rate: 0.34, category_rank: 3 }

