# Sample: "QuickClose" — a fintech mortgage point-of-sale product, 5 cycles of reception.
# Demonstrates full mode (cycles >= 4), a learning signal, and a SEEDED GOODHART CASE in cycle 5
# (revenue subscore rises while sentiment + retention fall) so the guard fires.
schema_version: 1

product:
  name: QuickClose
  domain_profile: fintech
  cycle: 5
  seed_refs:
    - path: ./specs/quickclose-init.md
    - path: ./docs/vision.md
    - path: ./notes/competitor-teardown.md

