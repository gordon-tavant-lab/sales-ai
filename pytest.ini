[pytest]
# This suite covers the import-readiness gate itself (tests/test_import_readiness.py).
# Each shipped skill's own scripts/test_*.py files are standalone unittest suites (see
# each file's own "Run: python3 test_X.py" docstring) — several skills ship a same-named
# module (score.py, common.py, ...) with no package namespacing between them, so a single
# pytest process collecting all of them at once hits Python's global sys.modules cache and
# silently imports the WRONG same-named module for whichever test file collects second.
# scripts/run_all_tests.sh runs every skill's suite in its own subprocess instead, which
# sidesteps the collision entirely; this file keeps default `pytest`/`pytest -q` scoped to
# the gate so that footgun can't resurface by accident.
testpaths = tests
